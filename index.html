<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signova - Text to Sign & Sign to Text Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://unpkg.com/meshoptimizer@0.21.0/meshopt_decoder.js"></script>
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="workspace">
        <div id="left-panel">
            <h2>Signova</h2>

            <div class="control-box">
                <h3>Translation Input</h3>
                <input type="text" id="textToSignInput" placeholder="Enter text to sign...">
                <button id="animateBtn">Animate Avatar</button>
                <button id="stopBtn" class="secondary">Stop</button>
                <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
                    <label style="font-size:13px;color:#64748b;white-space:nowrap">Speed (ms)</label>
                    <input type="range" id="speedSlider" min="400" max="2000" value="1000" step="100"
                        style="flex:1" oninput="document.getElementById('speedVal').textContent=this.value+'ms'">
                    <span id="speedVal" style="font-size:13px;font-weight:600;color:#4f46e5;min-width:50px">1000ms</span>
                </div>
            </div>

            <div class="control-box">
                <h3>Hand Tracking</h3>
                <div style="position:relative;">
                    <video id="video" autoplay></video>
                    <canvas id="canvas"></canvas>
                </div>
                <div style="display:flex; gap:8px;">
                    <button id="startTrackingBtn">Start Tracking</button>
                    <button id="stopTrackingBtn" class="secondary" style="flex:1;">Stop</button>
                </div>
                <button onclick="clearSentence()" class="secondary">Clear Output</button>
                
                <div id="prediction-status">
                    <div>Letter: <span id="letter">-</span></div>
                </div>
                <div id="sentence-display">
                    Output: <span id="sentence">Waiting...</span>
                </div>
            </div>

            <div class="control-box">
                <h3>Voice Command</h3>
                <button id="startMicBtn">Start Mic</button>
                <button id="stopMicBtn" class="secondary">Stop & Send Audio</button>
                <p style="font-size: 0.85rem; margin-top: 10px;"><strong>Transcription:</strong> <span id="speechResult">-</span></p>
            </div>
        </div>

        <div id="canvas-3d-container">
            <!-- Three.js Canvas will be injected here -->
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
