<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signova - Text to Sign & Sign to Text</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://unpkg.com/meshoptimizer@0.21.0/meshopt_decoder.js"></script>
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="workspace">
      <aside id="left-panel" aria-label="Controls">
        <h2>SIGNOVA.AI</h2>

        <section class="control-box" aria-labelledby="lbl-translation">
          <h3 id="lbl-translation">Translation Input</h3>
          <input
            type="text"
            id="textToSignInput"
            placeholder="Enter text to sign…"
            autocomplete="off"
            aria-label="Text to convert to sign language"
          >

          <button id="animateBtn" aria-label="Animate avatar with entered text">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Animate Avatar
          </button>

          <button id="stopBtn" class="secondary" aria-label="Stop animation">Stop</button>

          <div class="speed-row">
            <label for="speedSlider" class="speed-label">Speed</label>
            <input type="range" id="speedSlider" min="400" max="2000" value="1000" step="100"
              aria-label="Animation speed in milliseconds"
              oninput="document.getElementById('speedVal').textContent = this.value + 'ms'">
            <span id="speedVal" class="speed-val" aria-live="polite">1000ms</span>
          </div>
        </section>

        <section class="control-box" aria-labelledby="lbl-tracking">
          <h3 id="lbl-tracking">Hand Tracking</h3>
          <div class="cam-wrap">
            <video id="video" autoplay playsinline muted aria-label="Webcam feed for hand tracking"></video>
            <canvas id="canvas" aria-hidden="true" ></canvas>
          </div>

          <div class="btn-row">
            <button id="startTrackingBtn" aria-label="Start hand tracking">Start Tracking</button>
            <button id="stopTrackingBtn" class="secondary" aria-label="Stop hand tracking">Stop</button>
          </div>

          <button onclick="clearSentence()" class="secondary" aria-label="Clear detected sentence">Clear Output</button>

          <!-- Prediction readout -->
          <div id="prediction-status" role="status" aria-live="polite">
            <span class="pred-label">Letter:</span>
            <span id="letter" aria-label="Currently detected letter">-</span>
          </div>

          <div id="sentence-display" role="status" aria-live="polite">
            Output: <span id="sentence">Waiting…</span>
          </div>
        </section>

        <section class="control-box" aria-labelledby="lbl-voice">
          <h3 id="lbl-voice">Voice Command</h3>

          <button id="startMicBtn" aria-label="Start microphone recording">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            Start Mic
          </button>

          <button id="stopMicBtn" class="secondary" disabled aria-label="Stop recording and send audio">Stop &amp; Send Audio</button>

          <div class="speech-result-box">
            <span class="speech-result-label">Transcription</span>
            <span id="speechResult">—</span>
          </div>
        </section>
      </aside>
      <main id="canvas-3d-container" aria-label="3D avatar stage"></main>

    </div><!-- /#workspace -->

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
    <script src="auth.js" defer></script>
    <script type="module" src="app.js"></script>
</body>
</html>
